# =============================================================
# Stack da VPS — Evolution API (WhatsApp) + Postgres + Redis.
#
# PONTO CRÍTICO: a sessão do WhatsApp (o pareamento do QR Code) vive nos
# VOLUMES abaixo. Enquanto os volumes existirem, subir/descer/atualizar os
# containers NÃO pede QR de novo. Só um `docker compose down -v` (com -v!)
# apaga os volumes e força reler o QR — por isso o deploy.sh nunca usa -v.
#
# O "cérebro" do agente NÃO está aqui: ele roda na Vercel (Next.js) e é
# atualizado por git push, sem tocar nesta VPS. Esta stack só mantém a
# conexão do WhatsApp viva e entrega os webhooks para a Vercel.
# =============================================================

services:
  evolution-api:
    image: atendai/evolution-api:v2.1.1 # fixe a versão; não use :latest em produção
    container_name: evolution_api
    restart: always
    ports:
      - '8080:8080'
    environment:
      # --- servidor ---
      SERVER_URL: ${SERVER_URL} # ex.: https://evo.suaclinica.com.br
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      # --- persistência da sessão no Postgres (sobrevive a restart) ---
      DATABASE_ENABLED: 'true'
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://evolution:${POSTGRES_PASSWORD}@postgres:5432/evolution
      DATABASE_SAVE_DATA_INSTANCE: 'true'
      DATABASE_SAVE_DATA_NEW_MESSAGE: 'false'
      DATABASE_SAVE_MESSAGE_UPDATE: 'false'
      DATABASE_SAVE_DATA_CONTACTS: 'false'
      DATABASE_SAVE_DATA_CHATS: 'false'
      # --- cache no Redis ---
      CACHE_REDIS_ENABLED: 'true'
      CACHE_REDIS_URI: redis://redis:6379
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_LOCAL_ENABLED: 'false'
      # --- webhook: aponta para o app na Vercel ---
      WEBHOOK_GLOBAL_ENABLED: 'true'
      WEBHOOK_GLOBAL_URL: ${WEBHOOK_URL} # ex.: https://SEU-APP.vercel.app/api/whatsapp/evolution/webhook
      WEBHOOK_EVENTS_MESSAGES_UPSERT: 'true'
    volumes:
      - evolution_instances:/evolution/instances # <- sessão do WhatsApp
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    container_name: evolution_postgres
    restart: always
    environment:
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: evolution
    volumes:
      - postgres_data:/var/lib/postgresql/data # <- histórico de instâncias

  redis:
    image: redis:7-alpine
    container_name: evolution_redis
    restart: always
    volumes:
      - redis_data:/data

# Estes volumes NOMEADOS são o que preserva o pareamento do WhatsApp entre
# deploys. NUNCA rode `docker compose down -v` em produção.
volumes:
  evolution_instances:
  postgres_data:
  redis_data:
